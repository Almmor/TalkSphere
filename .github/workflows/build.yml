name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
            dist/*.zip

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: TalkSphere v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎉 TalkSphere v${{ steps.get_version.outputs.VERSION }}

            ### 📥 下载

            | 平台 | 文件 |
            |------|------|
            | Windows | `TalkSphere Setup x.x.x.exe` (安装版) / `TalkSphere x.x.x.exe` (便携版) |
            | macOS | `TalkSphere-x.x.x.dmg` (Intel) / `TalkSphere-x.x.x-arm64.dmg` (Apple Silicon) |
            | Linux | `TalkSphere-x.x.x.AppImage` / `.deb` / `.rpm` |

            ### ✨ 功能特性

            - 🤖 多模型支持 (OpenAI, Claude, Gemini, DeepSeek, 通义千问, 智谱GLM, 文心一言, Kimi, 豆包)
            - ⚖️ 多模型对比
            - 🎨 AI 绘画
            - 📚 知识库管理
            - 🔧 MCP 工具集成
            - 🎤 语音输入
            - 📤 多格式导出

            ### 📝 更新日志

            请查看 [commits](https://github.com/${{ github.repository }}/commits/main) 获取详细更新内容。
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Capacitor
        run: |
          npx cap init TalkSphere com.talksphere.app --web-dir src/renderer
          npx cap add android

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
